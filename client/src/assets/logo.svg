<svg width="260" height="60" viewBox="0 0 280 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#C8A867" />
            <stop offset="100%" stop-color="#EAD7A8" />
        </linearGradient>
        <linearGradient id="aiGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#EAD7A8" />
            <stop offset="50%" stop-color="#C8A867" />
            <stop offset="100%" stop-color="#EAD7A8" />
        </linearGradient>
        <linearGradient id="bodyGrad" x1="0.5" y1="0" x2="0.5" y2="1">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#fdfbf7" />
        </linearGradient>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2.5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#C8A867" flood-opacity="0.3" />
        </filter>
    </defs>

    <!-- Icon: shopping bag inside rounded square -->
    <g filter="url(#shadow)">
        <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#iconGrad)" />
        <!-- Shopping bag body -->
        <rect x="20" y="26" width="24" height="22" rx="3" fill="none" stroke="#1A1612" stroke-width="2.2" />
        <!-- Bag handle -->
        <path d="M26 26 V22 C26 18.5 28.7 16 32 16 C35.3 16 38 18.5 38 22 V26" fill="none" stroke="#1A1612" stroke-width="2.2" stroke-linecap="round" />
    </g>

    <!-- Brand text -->
    <text x="72" y="33" font-family="'Inter', 'Poppins', Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="-0.5" fill="white">VFit</text>
    <text x="134" y="33" font-family="'Inter', 'Poppins', Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="-0.5" fill="url(#aiGrad)">AI</text>
    <text x="72" y="50" font-family="'Inter', Arial, sans-serif" font-size="10.5" font-weight="500" fill="#EAD7A8" opacity="0.85">Thử đồ 3D &amp; Mua sắm thông minh</text>
</svg>